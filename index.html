<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PRINT MONEY</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #000;
  --fg: #fff;
  --card: #111;
  --border: #222;
  --border2: #333;
  --muted: #555;
  --muted2: #888;
  --btn-bg: #fff;
  --btn-fg: #000;
}

body.light {
  --bg: #fff;
  --fg: #000;
  --card: #f5f5f5;
  --border: #ddd;
  --border2: #ccc;
  --muted: #999;
  --muted2: #777;
  --btn-bg: #000;
  --btn-fg: #fff;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg);
  color: var(--fg);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding: 40px 20px;
  transition: background .2s, color .2s;
}
.container { width: 100%; max-width: 520px; }
.form { margin-bottom: 32px; }
.row {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}
.row input {
  flex: 1;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--fg);
  padding: 10px 12px;
  font-size: 14px;
  outline: none;
  border-radius: 4px;
  transition: background .2s, border .2s, color .2s;
}
.row input:focus { border-color: var(--muted); }
.row input::placeholder { color: var(--muted); }
.btn {
  background: var(--btn-bg);
  color: var(--btn-fg);
  border: none;
  padding: 10px 18px;
  font-size: 14px;
  font-weight: 600;
  border-radius: 4px;
  cursor: pointer;
  white-space: nowrap;
  transition: transform .15s, box-shadow .15s, opacity .2s;
}
.btn:hover {
  opacity: .85;
  transform: scale(1.04);
  box-shadow: 0 0 12px rgba(255,255,255,.15);
}
.btn:active {
  transform: scale(.96);
}
.btn-outline {
  background: transparent;
  color: var(--fg);
  border: 1px solid var(--border);
  padding: 10px 18px;
  font-size: 14px;
  font-weight: 600;
  border-radius: 4px;
  cursor: pointer;
  transition: transform .15s, border .2s, opacity .2s;
}
.btn-outline:hover {
  border-color: var(--muted);
  opacity: .8;
  transform: scale(1.04);
}
.btn-outline:active {
  transform: scale(.96);
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}
th {
  text-align: left;
  padding: 10px 8px;
  border-bottom: 1px solid var(--border);
  color: var(--muted2);
  font-weight: 500;
}
td {
  padding: 10px 8px;
  border-bottom: 1px solid var(--border);
  transition: background .15s;
}
tbody tr:hover td {
  background: var(--card);
}
td:nth-child(2), th:nth-child(2) { text-align: right; }
td:nth-child(3), th:nth-child(3) { text-align: right; }
td:nth-child(4), th:nth-child(4) { text-align: right; }
td:nth-child(5), th:nth-child(5) { text-align: right; }
.profit { color: #4ade80; }
.loss { color: #f87171; }
.total {
  display: flex;
  justify-content: space-between;
  padding: 16px 8px 0;
  margin-top: 8px;
  border-top: 1px solid var(--border2);
  font-size: 16px;
  font-weight: 600;
  transition: border .2s;
}
.empty {
  text-align: center;
  color: var(--muted);
  font-size: 14px;
  padding: 40px 0;
}
.del {
  color: var(--muted);
  cursor: pointer;
  font-size: 16px;
  margin-left: 8px;
  transition: color .15s, transform .15s;
}
.del:hover {
  color: #f87171;
  transform: scale(1.2);
}
.del:active {
  transform: scale(.9);
}
.actions {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}
.actions .btn { flex: 1; }

@media (max-width: 480px) {
  body { padding: 24px 16px; }
  .row { flex-wrap: wrap; gap: 8px; }
  .row input { flex: 1 1 100%; padding: 14px 12px; font-size: 16px; }
  .row .btn { flex: 1 1 100%; padding: 14px; font-size: 16px; }
  .btn-outline { padding: 8px 10px; font-size: 12px; }
  .container { max-width: 100%; }
  td, th { padding: 10px 4px; font-size: 12px; }
  td:nth-child(5), th:nth-child(5) { font-size: 11px; }
  .total { font-size: 15px; }
  .del { font-size: 20px; padding: 4px; }
}
</style>
</head>
<body>
<div class="container">

<div style="text-align:center;margin-bottom:24px;">
  <div style="font-size:36px;font-weight:700;letter-spacing:3px;margin-bottom:4px;transition:color .2s;">PRINT MONEY</div>
  <div style="display:flex;justify-content:space-between;align-items:center;">
    <span></span>
    <h1 style="margin:0;font-size:14px;font-weight:400;color:var(--muted2);text-align:center;flex:1;transition:color .2s;">analyser les ventes</h1>
    <button class="btn-outline" id="themeToggle" style="font-size:13px;padding:6px 12px;">blanc</button>
  </div>
</div>

<div class="form">
  <div class="row">
    <input type="text" id="article" placeholder="article" autocomplete="off">
    <input type="number" id="achat" placeholder="achat €" step="0.01">
    <input type="number" id="vente" placeholder="vente €" step="0.01">
    <button class="btn" id="ajouter">+</button>
  </div>
</div>

<table>
  <thead>
    <tr>
      <th>article</th>
      <th>achat</th>
      <th>revente</th>
      <th>total</th>
      <th>marge</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>

<div class="total">
  <span>bénéfice total</span>
  <span id="totalSpan">0,00 €</span>
</div>

<div class="actions">
  <button class="btn" id="pdfBtn">imprimer</button>
  <button class="btn-outline" id="shareBtn">partager</button>
</div>
</div>

<script>
const STORAGE_KEY = 'vt_sales';
const THEME_KEY = 'vt_theme';
let sales = [];
let theme = 'dark';

function load() {
  try {
    const d = localStorage.getItem(STORAGE_KEY);
    if (d) sales = JSON.parse(d);
  } catch(e) {}
  try {
    const t = localStorage.getItem(THEME_KEY);
    if (t === 'light' || t === 'dark') theme = t;
  } catch(e) {}
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(sales));
}

function saveTheme() {
  localStorage.setItem(THEME_KEY, theme);
}

function applyTheme() {
  document.body.classList.toggle('light', theme === 'light');
  document.getElementById('themeToggle').textContent = theme === 'dark' ? 'blanc' : 'noir';
}

function render() {
  const tbody = document.getElementById('tbody');
  const totalSpan = document.getElementById('totalSpan');
  
  if (sales.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5" class="empty">aucune vente</td></tr>';
    totalSpan.textContent = '0,00 €';
    return;
  }

  let total = 0;
  let totalCost = 0;
  let html = '';

  for (let i = 0; i < sales.length; i++) {
    const s = sales[i];
    const p = s.vente - s.achat;
    total += p;
    totalCost += s.achat;
    const cls = p >= 0 ? 'profit' : 'loss';
    const sign = p >= 0 ? '+' : '';
    const mult = s.achat > 0 ? (s.vente / s.achat) : 0;
    const multStr = mult % 1 === 0 ? mult.toFixed(0) : mult.toFixed(1);
    html += `<tr>
      <td>${esc(s.article)}</td>
      <td>${fmt(s.achat)}</td>
      <td>${fmt(s.vente)}</td>
      <td class="${cls}">${sign}${p.toFixed(2).replace('.', ',')} €</td>
      <td><span style="font-size:18px;line-height:1">×</span>${multStr}<span class="del" data-i="${i}">✕</span></td>
    </tr>`;
  }

  tbody.innerHTML = html;
  totalSpan.textContent = (total >= 0 ? '+' : '') + total.toFixed(2).replace('.', ',') + ' €';
  
  document.querySelectorAll('.del').forEach(el => {
    el.addEventListener('click', function() {
      sales.splice(parseInt(this.dataset.i), 1);
      save();
      render();
    });
  });
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function fmt(n) {
  return n.toFixed(2).replace('.', ',') + ' €';
}


document.getElementById('ajouter').addEventListener('click', function() {
  const article = document.getElementById('article').value.trim();
  const achat = parseFloat(document.getElementById('achat').value);
  const vente = parseFloat(document.getElementById('vente').value);
  
  if (!article || isNaN(achat) || isNaN(vente)) return;
  
  sales.push({ article, achat, vente });
  save();
  render();
  
  document.getElementById('article').value = '';
  document.getElementById('achat').value = '';
  document.getElementById('vente').value = '';
  document.getElementById('article').focus();
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('ajouter').click();
});

document.getElementById('themeToggle').addEventListener('click', function() {
  theme = theme === 'dark' ? 'light' : 'dark';
  applyTheme();
  saveTheme();
});

document.getElementById('pdfBtn').addEventListener('click', function() {
  if (sales.length === 0) return;

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'mm', format: 'a4' });
  const isLight = theme === 'light';

  doc.setFillColor(isLight ? 255 : 0, isLight ? 255 : 0, isLight ? 255 : 0);
  doc.rect(0, 0, 210, 297, 'F');

  doc.setTextColor(isLight ? 0 : 255, isLight ? 0 : 255, isLight ? 0 : 255);
  doc.setFontSize(20);
  doc.text('PRINT MONEY', 105, 18, { align: 'center' });

  doc.setFontSize(10);
  doc.setTextColor(isLight ? 100 : 180, isLight ? 100 : 180, isLight ? 100 : 180);
  doc.text('analyser les ventes', 105, 25, { align: 'center' });

  let total = 0;
  let totalCost = 0;
  const rows = sales.map(s => {
    const p = s.vente - s.achat;
    total += p;
    totalCost += s.achat;
    const mult = s.achat > 0 ? (s.vente / s.achat) : 0;
    const multStr = mult % 1 === 0 ? mult.toFixed(0) : mult.toFixed(1);
    return [s.article, s.achat.toFixed(2) + ' €', s.vente.toFixed(2) + ' €', (p >= 0 ? '+' : '') + p.toFixed(2) + ' €', '×' + multStr];
  });

  rows.push([{ content: 'total', colSpan: 3, styles: { fontStyle: 'bold' } }, (total >= 0 ? '+' : '') + total.toFixed(2) + ' €', '']);

  doc.autoTable({
    startY: 32,
    head: [['article', 'achat', 'revente', 'total', 'marge']],
    body: rows,
    theme: 'grid',
    tableLineColor: isLight ? 200 : 50,
    tableLineWidth: 0.3,
    headStyles: {
      fillColor: isLight ? 240 : 30,
      textColor: isLight ? 0 : 255,
      fontStyle: 'bold',
      fontSize: 10,
    },
    bodyStyles: {
      textColor: isLight ? 0 : 255,
      fontSize: 9,
      fillColor: isLight ? 255 : 0,
    },
    alternateRowStyles: {
      fillColor: isLight ? 248 : 15,
    },
    columnStyles: {
      0: { cellWidth: 44 },
      1: { cellWidth: 24, halign: 'right' },
      2: { cellWidth: 24, halign: 'right' },
      3: { cellWidth: 32, halign: 'right' },
      4: { cellWidth: 24, halign: 'right' },
    },
  });

  doc.save('ventes.pdf');
});

document.getElementById('shareBtn').addEventListener('click', function() {
  if (sales.length === 0) return;
  let total = 0;
  let lines = sales.map(s => {
    const p = s.vente - s.achat;
    total += p;
    const mult = s.achat > 0 ? (s.vente / s.achat) : 0;
    const multStr = mult % 1 === 0 ? mult.toFixed(0) : mult.toFixed(1);
    return `${s.article} | ${s.achat.toFixed(2)}€ → ${s.vente.toFixed(2)}€ | ${p >= 0 ? '+' : ''}${p.toFixed(2)}€ | ×${multStr}`;
  }).join('\n');
  const msg = `PRINT MONEY\n\n${lines}\n\nbénéfice total : ${total >= 0 ? '+' : ''}${total.toFixed(2)}€`;
  if (navigator.share) {
    navigator.share({ title: 'PRINT MONEY', text: msg });
  } else {
    navigator.clipboard.writeText(msg).then(() => {
      const btn = document.getElementById('shareBtn');
      const orig = btn.textContent;
      btn.textContent = 'copié !';
      setTimeout(() => btn.textContent = orig, 1500);
    });
  }
});

load();
applyTheme();
render();
</script>
</body>
</html>
