<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>analyser les ventes</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#000;--fg:#fff;--card:#111;--border:#222;--border2:#333;--muted:#555;--muted2:#888;--btn-bg:#fff;--btn-fg:#000}
body.light{--bg:#fff;--fg:#000;--card:#f5f5f5;--border:#ddd;--border2:#ccc;--muted:#999;--muted2:#777;--btn-bg:#000;--btn-fg:#fff}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--fg);min-height:100vh;display:flex;justify-content:center;padding:40px 20px;transition:background .2s,color .2s}
.container{width:100%;max-width:520px}
.auth-wrap{width:100%;max-width:360px;margin:auto}
.auth{text-align:center}
.auth h2{font-size:28px;font-weight:700;letter-spacing:2px;margin-bottom:32px}
.auth input{width:100%;background:var(--card);border:1px solid var(--border);color:var(--fg);padding:14px;font-size:15px;outline:none;border-radius:4px;margin-bottom:10px}
.auth input:focus{border-color:var(--muted)}
.btn{background:var(--btn-bg);color:var(--btn-fg);border:none;padding:10px 18px;font-size:14px;font-weight:600;border-radius:4px;cursor:pointer;white-space:nowrap;transition:transform .15s,opacity .2s}
.btn:hover{opacity:.85;transform:scale(1.03)}
.btn:active{transform:scale(.96)}
.btn:disabled{opacity:.5;cursor:default;transform:none}
.btn-outline{background:transparent;color:var(--fg);border:1px solid var(--border);padding:10px 18px;font-size:14px;font-weight:600;border-radius:4px;cursor:pointer;transition:transform .15s,border .2s,opacity .2s}
.btn-outline:hover{border-color:var(--muted);opacity:.8;transform:scale(1.03)}
.btn-outline:active{transform:scale(.96)}
.link{color:var(--muted);font-size:13px;cursor:pointer;transition:color .15s}
.link:hover{color:var(--fg)}
.error{color:#f87171;font-size:13px;margin-bottom:10px;min-height:18px}
.success{color:#4ade80;font-size:13px;margin-bottom:10px;min-height:18px}
.user-bar{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--muted2);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.user-bar .link-logout{color:var(--muted);cursor:pointer;font-size:12px}
.user-bar .link-logout:hover{color:#f87171}
.form{margin-bottom:32px}
.row{display:flex;gap:10px;margin-bottom:10px}
.row input{flex:1;background:var(--card);border:1px solid var(--border);color:var(--fg);padding:10px 12px;font-size:14px;outline:none;border-radius:4px;transition:background .2s,border .2s,color .2s}
.row input:focus{border-color:var(--muted)}
.row input::placeholder{color:var(--muted)}
table{width:100%;border-collapse:collapse;font-size:14px}
th{text-align:left;padding:10px 8px;border-bottom:1px solid var(--border);color:var(--muted2);font-weight:500}
td{padding:10px 8px;border-bottom:1px solid var(--border);transition:background .15s}
tbody tr:hover td{background:var(--card)}
td:nth-child(2),th:nth-child(2){text-align:right}
td:nth-child(3),th:nth-child(3){text-align:right}
td:nth-child(4),th:nth-child(4){text-align:right}
td:nth-child(5),th:nth-child(5){text-align:right}
.profit{color:#4ade80}
.loss{color:#f87171}
.total{display:flex;justify-content:space-between;padding:16px 8px 0;margin-top:8px;border-top:1px solid var(--border2);font-size:16px;font-weight:600;transition:border .2s}
.empty{text-align:center;color:var(--muted);font-size:14px;padding:40px 0}
.del{color:var(--muted);cursor:pointer;font-size:16px;margin-left:8px;transition:color .15s,transform .15s}
.del:hover{color:#f87171;transform:scale(1.2)}
.del:active{transform:scale(.9)}
.actions{display:flex;gap:10px;margin-top:20px}
.actions .btn{flex:1}
.history-item{display:flex;justify-content:space-between;align-items:center;padding:10px 8px;border-bottom:1px solid var(--border);font-size:13px;cursor:pointer;transition:background .15s}
.history-item:hover{background:var(--card)}
.history-item-name{font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.history-item-info{display:flex;align-items:center;gap:12px;color:var(--muted);font-size:12px;flex-shrink:0}
.history-del{color:var(--muted);cursor:pointer;font-size:14px;padding:2px 4px;transition:color .15s}
.history-del:hover{color:#f87171}
.history-restore:hover{color:#4ade80!important}
.clear-all{text-align:center;margin-top:12px}
.clear-all button{background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;transition:color .15s}
.clear-all button:hover{color:#f87171}
@media(max-width:480px){
  body{padding:24px 16px}
  .row{flex-wrap:wrap;gap:8px}
  .row input{flex:1 1 100%;padding:14px 12px;font-size:16px}
  .row .btn{flex:1 1 100%;padding:14px;font-size:16px}
  .btn-outline{padding:8px 10px;font-size:12px}
  .container{max-width:100%}
  td,th{padding:10px 4px;font-size:12px}
  td:nth-child(5),th:nth-child(5){font-size:11px}
  .total{font-size:14px;padding:12px 4px 0}
  .del{font-size:20px;padding:4px}
  .auth input{padding:14px;font-size:16px}
}
</style>
</head>
<body>

<div id="app">
<div class="container" id="mainView" style="display:none">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
    <div style="font-size:28px;font-weight:700;letter-spacing:2px">analyser les ventes</div>
    <button class="btn-outline" id="themeToggle" style="font-size:12px;padding:4px 10px">blanc</button>
  </div>

  <div id="userBar" class="user-bar" style="display:none">
    <span id="userEmail"></span>
    <span class="link-logout" id="logoutBtn">déconnexion</span>
  </div>

  <div class="form">
    <div class="row">
      <input type="text" id="article" placeholder="article" autocomplete="off">
      <input type="number" id="achat" placeholder="achat €" step="0.01">
      <input type="number" id="vente" placeholder="vente €" step="0.01">
      <button class="btn" id="ajouter">+</button>
    </div>
  </div>

  <table>
    <thead>
      <tr>
        <th>article</th>
        <th>achat</th>
        <th>revente</th>
        <th>total</th>
        <th>marge</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>

  <div class="total">
    <span>bénéfice total</span>
    <span id="totalSpan">0,00 €</span>
  </div>
  <div id="roi" style="font-size:12px;color:var(--muted);padding:4px 8px 0;text-align:right;display:none"></div>

  <div class="actions">
    <button class="btn" id="pdfBtn">imprimer</button>
    <button class="btn-outline" id="shareBtn">partager</button>
    <button class="btn-outline" id="historyBtn">historique</button>
  </div>
</div>

<div class="auth-wrap" id="authView">
  <div style="text-align:right;margin-bottom:8px">
    <button class="btn-outline" id="authThemeToggle" style="font-size:12px;padding:4px 10px">blanc</button>
  </div>
  <div class="auth">
    <h2 id="authTitle">connexion</h2>
    <div id="authMsg" class="error" style="min-height:20px"></div>
    <input type="email" id="authEmail" placeholder="email" autocomplete="email">
    <input type="password" id="authPassword" placeholder="mot de passe">
    <button class="btn" id="authBtn" style="width:100%;margin-bottom:8px">se connecter</button>
    <div><span class="link" id="authToggle">pas encore de compte ? s'inscrire</span></div>
  </div>
</div>

<div id="historyView" class="container" style="display:none">
  <div style="display:flex;align-items:center;margin-bottom:16px">
    <button class="btn" id="backBtn" style="padding:6px 14px;font-size:13px">← retour</button>
    <span style="font-size:14px;font-weight:600;flex:1;text-align:center">historique</span>
    <button class="btn-outline" id="saveBtn" style="font-size:12px;padding:4px 10px">sauvegarder</button>
  </div>
  <div id="historyList"></div>
</div>
</div>

<script>
const SUPABASE_URL = 'https://mbimktqlsqhxmzbbbhkc.supabase.co';
const SUPABASE_KEY = 'sb_publishable_PpJOgXn3RoX6ZZJJbeyimg_E9QVpZg9';
const SERVICE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1iaW1rdHFsc3FoeG16YmJiaGtjIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MTAyMTYwMSwiZXhwIjoyMDk2NTk3NjAxfQ.5tC8-0Y1Fhswu-GeX3g5vhRE8bmfD8QD_7Z3QsfOlEI';

const STORAGE_KEY = 'vt_sales';
const THEME_KEY = 'vt_theme';
const HISTORY_KEY = 'vt_history';
const AUTH_KEY = 'vt_auth';

let sales = [];
let theme = 'dark';
let history = [];
let authUser = null;
let isSignUp = false;
let supabaseReady = true;

function sb(method, path, body) {
  const headers = { apikey: SUPABASE_KEY, 'Content-Type': 'application/json' };
  const tok = localStorage.getItem(AUTH_KEY);
  if (tok) headers.Authorization = 'Bearer ' + tok;
  const opts = { method, headers };
  if (body) opts.body = JSON.stringify(body);
  return fetch(SUPABASE_URL + path, opts).then(r => r.ok ? r.json() : r.json().then(e => { throw e }));
}

async function signUp(email, pw) {
  const r = await fetch(SUPABASE_URL + '/auth/v1/admin/users', {
    method: 'POST',
    headers: { apikey: SERVICE_KEY, Authorization: 'Bearer ' + SERVICE_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, password: pw, email_confirm: true })
  });
  const j = await r.json();
  if (!r.ok) throw j;
  localStorage.setItem(AUTH_KEY, j.access_token);
  authUser = j;
  return j;
}

async function signIn(email, pw) {
  const r = await fetch(SUPABASE_URL + '/auth/v1/token?grant_type=password', {
    method: 'POST',
    headers: { apikey: SUPABASE_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, password: pw })
  });
  const j = await r.json();
  if (!r.ok) throw j;
  localStorage.setItem(AUTH_KEY, j.access_token);
  authUser = j.user;
  return j;
}

function signOut() {
  localStorage.removeItem(AUTH_KEY);
  authUser = null;
}

function getToken() {
  return localStorage.getItem(AUTH_KEY);
}

async function loadCloudData() {
  if (!authUser) return;
  try {
    const sData = await sb('GET', '/rest/v1/sales?order=created_at.asc');
    if (Array.isArray(sData)) sales = sData.map(r => ({ article: r.article, achat: r.achat, vente: r.vente }));
    const hData = await sb('GET', '/rest/v1/history_sessions?order=created_at.asc');
    if (Array.isArray(hData)) history = hData.map(r => ({ id: r.id, name: r.name, sales: r.sales }));
  } catch(e) { console.error('cloud load error', e); }
}

async function saveSales() {
  if (authUser) {
    try {
      await sb('DELETE', '/rest/v1/sales?user_id=eq.' + authUser.id);
      if (sales.length) {
        await sb('POST', '/rest/v1/sales', sales.map(s => ({ user_id: authUser.id, article: s.article, achat: s.achat, vente: s.vente })));
      }
    } catch(e) { console.error('cloud save error', e); }
  }
  localStorage.setItem(STORAGE_KEY, JSON.stringify(sales));
}

async function saveHistoryCloud() {
  if (authUser) {
    try {
      await sb('DELETE', '/rest/v1/history_sessions?user_id=eq.' + authUser.id);
      if (history.length) {
        await sb('POST', '/rest/v1/history_sessions', history.map(h => ({ user_id: authUser.id, name: h.name, sales: h.sales })));
      }
    } catch(e) { console.error('cloud history save error', e); }
  }
  localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
}

function loadLocal() {
  try { const d = localStorage.getItem(STORAGE_KEY); if (d) sales = JSON.parse(d); } catch(e) {}
  try { const h = localStorage.getItem(HISTORY_KEY); if (h) history = JSON.parse(h); } catch(e) {}
  try { const t = localStorage.getItem(THEME_KEY); if (t === 'light' || t === 'dark') theme = t; } catch(e) {}
}

function saveTheme() { localStorage.setItem(THEME_KEY, theme); }

function applyTheme() {
  document.body.classList.toggle('light', theme === 'light');
  const txt = theme === 'dark' ? 'blanc' : 'noir';
  const e1 = document.getElementById('themeToggle');
  const e2 = document.getElementById('authThemeToggle');
  if (e1) e1.textContent = txt;
  if (e2) e2.textContent = txt;
}

function toggleTheme() {
  theme = theme === 'dark' ? 'light' : 'dark';
  applyTheme();
  saveTheme();
}

function showAuth() {
  document.getElementById('mainView').style.display = 'none';
  document.getElementById('historyView').style.display = 'none';
  document.getElementById('authView').style.display = '';
}

function showMain() {
  document.getElementById('authView').style.display = 'none';
  document.getElementById('historyView').style.display = 'none';
  document.getElementById('mainView').style.display = '';
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function fmt(n) { return n.toFixed(2).replace('.', ',') + ' €'; }

function render() {
  const tbody = document.getElementById('tbody');
  const totalSpan = document.getElementById('totalSpan');

  if (!sales.length) {
    tbody.innerHTML = '<tr><td colspan="5" class="empty">aucune vente</td></tr>';
    totalSpan.textContent = '0,00 €';
    document.getElementById('roi').style.display = 'none';
    return;
  }

  let total = 0, totalCost = 0, html = '';
  for (let i = 0; i < sales.length; i++) {
    const s = sales[i];
    const p = s.vente - s.achat;
    total += p;
    totalCost += s.achat;
    const cls = p >= 0 ? 'profit' : 'loss';
    const sign = p >= 0 ? '+' : '';
    const mult = s.achat > 0 ? (s.vente / s.achat) : 0;
    const multStr = mult % 1 === 0 ? mult.toFixed(0) : mult.toFixed(1);
    html += `<tr>
      <td>${esc(s.article)}</td>
      <td>${fmt(s.achat)}</td>
      <td>${fmt(s.vente)}</td>
      <td class="${cls}">${sign}${p.toFixed(2).replace('.', ',')} €</td>
      <td><span style="font-size:18px;line-height:1">×</span>${multStr}<span class="del" data-i="${i}">✕</span></td>
    </tr>`;
  }

  tbody.innerHTML = html;
  totalSpan.textContent = (total >= 0 ? '+' : '') + total.toFixed(2).replace('.', ',') + ' €';

  document.querySelectorAll('.del').forEach(el => {
    el.addEventListener('click', async function() {
      const idx = parseInt(this.dataset.i);
      const item = sales[idx];
      const now = new Date();
      const pad = n => String(n).padStart(2, '0');
      const name = `archivé: ${item.article} ${pad(now.getDate())}/${pad(now.getMonth()+1)}`;
      history.push({ id: Date.now(), name, sales: [item] });
      await saveHistoryCloud();
      sales.splice(idx, 1);
      await saveSales();
      render();
    });
  });

  const roiEl = document.getElementById('roi');
  if (totalCost > 0) {
    const pct = (total / totalCost) * 100;
    const sign = pct >= 0 ? '+' : '';
    const cls = total >= 0 ? 'profit' : 'loss';
    roiEl.innerHTML = `rentabilité : <span class="${cls}">${sign}${pct.toFixed(1).replace('.', ',')} %</span>`;
    roiEl.style.display = '';
  } else {
    roiEl.style.display = 'none';
  }
}

function renderHistory() {
  const el = document.getElementById('historyList');
  if (!history.length) {
    el.innerHTML = '<div style="text-align:center;color:var(--muted);font-size:12px;padding:12px 0">aucun historique</div>';
    return;
  }
  let html = '';
  for (let i = history.length - 1; i >= 0; i--) {
    const h = history[i];
    const total = h.sales.reduce((s, x) => s + x.vente - x.achat, 0);
    const sign = total >= 0 ? '+' : '';
    html += `<div class="history-item" data-i="${i}">
      <div class="history-item-name">${esc(h.name)}</div>
      <div class="history-item-info">
        <span>${h.sales.length} art.</span>
        <span style="color:${total >= 0 ? '#4ade80' : '#f87171'}">${sign}${total.toFixed(2).replace('.', ',')} €</span>
        <span class="history-restore" data-i="${i}" style="color:var(--muted);cursor:pointer;font-size:12px">déplacer</span>
        <span class="history-del" data-i="${i}">✕</span>
      </div>
    </div>`;
  }
  el.innerHTML = html + '<div class="clear-all"><button id="clearAllBtn">tout supprimer</button></div>';

  el.querySelectorAll('.history-item').forEach(el2 => {
    el2.addEventListener('click', function(e) {
      if (e.target.classList.contains('history-del') || e.target.classList.contains('history-restore')) return;
      const idx = parseInt(this.dataset.i);
      sales = JSON.parse(JSON.stringify(history[idx].sales));
      saveSales();
      render();
      showMain();
    });
  });

  el.querySelectorAll('.history-del').forEach(el2 => {
    el2.addEventListener('click', function(e) {
      e.stopPropagation();
      history.splice(parseInt(this.dataset.i), 1);
      saveHistoryCloud();
      renderHistory();
    });
  });

  el.querySelectorAll('.history-restore').forEach(el2 => {
    el2.addEventListener('click', function(e) {
      e.stopPropagation();
      const idx = parseInt(this.dataset.i);
      sales = sales.concat(JSON.parse(JSON.stringify(history[idx].sales)));
      history.splice(idx, 1);
      saveSales();
      saveHistoryCloud();
      render();
      showMain();
    });
  });

  const clearBtn = document.getElementById('clearAllBtn');
  if (clearBtn) {
    clearBtn.addEventListener('click', function() {
      if (confirm('Supprimer tout l\'historique ?')) {
        history = [];
        saveHistoryCloud();
        renderHistory();
      }
    });
  }
}

async function initUser(user) {
  authUser = user;
  if (user) {
    document.getElementById('userEmail').textContent = user.email;
    document.getElementById('userBar').style.display = '';
    await loadCloudData();
    showMain();
  } else {
    document.getElementById('userBar').style.display = 'none';
    loadLocal();
    showAuth();
  }
  applyTheme();
  render();
}

async function init() {
  const tok = getToken();
  if (tok) {
    try {
      const r = await fetch(SUPABASE_URL + '/auth/v1/user', {
        headers: { apikey: SUPABASE_KEY, Authorization: 'Bearer ' + tok }
      });
      if (r.ok) {
        const user = await r.json();
        await initUser(user);
        return;
      }
    } catch(e) {}
    localStorage.removeItem(AUTH_KEY);
  }
  initUser(null);
}

// ---- Event listeners ----

document.getElementById('themeToggle').addEventListener('click', toggleTheme);
document.getElementById('authThemeToggle').addEventListener('click', toggleTheme);

document.getElementById('ajouter').addEventListener('click', async function() {
  const article = document.getElementById('article').value.trim();
  const achat = parseFloat(document.getElementById('achat').value);
  const vente = parseFloat(document.getElementById('vente').value);
  if (!article || isNaN(achat) || isNaN(vente)) return;
  sales.push({ article, achat, vente });
  await saveSales();
  render();
  document.getElementById('article').value = '';
  document.getElementById('achat').value = '';
  document.getElementById('vente').value = '';
  document.getElementById('article').focus();
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && document.getElementById('mainView').style.display !== 'none') {
    document.getElementById('ajouter').click();
  }
});

document.getElementById('pdfBtn').addEventListener('click', function() {
  if (!sales.length) return;
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'mm', format: 'a4' });
  const light = theme === 'light';
  doc.setFillColor(light ? 255 : 0, light ? 255 : 0, light ? 255 : 0);
  doc.rect(0, 0, 210, 297, 'F');
  doc.setTextColor(light ? 0 : 255, light ? 0 : 255, light ? 0 : 255);
  doc.setFontSize(20);
  doc.text('analyser les ventes', 105, 18, { align: 'center' });
  let total = 0, totalCost = 0;
  const rows = sales.map(s => {
    const p = s.vente - s.achat;
    total += p;
    totalCost += s.achat;
    const mult = s.achat > 0 ? (s.vente / s.achat) : 0;
    return [s.article, s.achat.toFixed(2) + ' €', s.vente.toFixed(2) + ' €', (p >= 0 ? '+' : '') + p.toFixed(2) + ' €', '×' + (mult % 1 === 0 ? mult.toFixed(0) : mult.toFixed(1))];
  });
  rows.push([{ content: 'total', colSpan: 3, styles: { fontStyle: 'bold' } }, (total >= 0 ? '+' : '') + total.toFixed(2) + ' €', '']);
  doc.autoTable({
    startY: 32, head: [['article', 'achat', 'revente', 'total', 'marge']], body: rows,
    theme: 'grid', tableLineColor: light ? 200 : 50, tableLineWidth: 0.3,
    headStyles: { fillColor: light ? 240 : 30, textColor: light ? 0 : 255, fontStyle: 'bold', fontSize: 10 },
    bodyStyles: { textColor: light ? 0 : 255, fontSize: 9, fillColor: light ? 255 : 0 },
    alternateRowStyles: { fillColor: light ? 248 : 15 },
    columnStyles: { 0: { cellWidth: 44 }, 1: { cellWidth: 24, halign: 'right' }, 2: { cellWidth: 24, halign: 'right' }, 3: { cellWidth: 32, halign: 'right' }, 4: { cellWidth: 24, halign: 'right' } }
  });
  doc.save('ventes.pdf');
});

document.getElementById('shareBtn').addEventListener('click', function() {
  if (!sales.length) return;
  let total = 0;
  const lines = sales.map(s => {
    const p = s.vente - s.achat;
    total += p;
    const mult = s.achat > 0 ? (s.vente / s.achat) : 0;
    return `${s.article} | ${s.achat.toFixed(2)}€ → ${s.vente.toFixed(2)}€ | ${p >= 0 ? '+' : ''}${p.toFixed(2)}€ | ×${mult % 1 === 0 ? mult.toFixed(0) : mult.toFixed(1)}`;
  }).join('\n');
  const msg = `analyser les ventes\n\n${lines}\n\nbénéfice total : ${total >= 0 ? '+' : ''}${total.toFixed(2)}€`;
  if (navigator.share) {
    navigator.share({ title: 'analyser les ventes', text: msg });
  } else {
    navigator.clipboard.writeText(msg).then(() => {
      const btn = document.getElementById('shareBtn');
      const orig = btn.textContent;
      btn.textContent = 'copié !';
      setTimeout(() => btn.textContent = orig, 1500);
    });
  }
});

document.getElementById('historyBtn').addEventListener('click', function() {
  document.getElementById('mainView').style.display = 'none';
  document.getElementById('historyView').style.display = '';
  renderHistory();
});

document.getElementById('backBtn').addEventListener('click', function() {
  document.getElementById('historyView').style.display = 'none';
  document.getElementById('mainView').style.display = '';
});

document.getElementById('saveBtn').addEventListener('click', async function() {
  if (!sales.length) return;
  const now = new Date();
  const pad = n => String(n).padStart(2, '0');
  const name = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`;
  history.push({ id: Date.now(), name, sales: JSON.parse(JSON.stringify(sales)) });
  await saveHistoryCloud();
  renderHistory();
  this.textContent = '✓';
  setTimeout(() => this.textContent = 'sauvegarder', 1000);
});

// Auth
document.getElementById('authToggle').addEventListener('click', function() {
  isSignUp = !isSignUp;
  document.getElementById('authTitle').textContent = isSignUp ? 'inscription' : 'connexion';
  document.getElementById('authBtn').textContent = isSignUp ? "s'inscrire" : 'se connecter';
  this.textContent = isSignUp ? 'déjà un compte ? se connecter' : "pas encore de compte ? s'inscrire";
  document.getElementById('authMsg').textContent = '';
  document.getElementById('authMsg').className = 'error';
});

document.getElementById('authBtn').addEventListener('click', async function() {
  const msg = document.getElementById('authMsg');
  msg.className = 'error';
  msg.textContent = '';
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  if (!email || !password) { msg.textContent = 'remplis tous les champs'; return; }
  this.textContent = '...';
  this.disabled = true;
  try {
    if (isSignUp) {
      const r = await signUp(email, password);
      if (r.access_token) {
        await initUser(authUser);
      } else {
        msg.className = 'success';
        msg.textContent = 'compte créé ! vérifie tes emails';
      }
    } else {
      await signIn(email, password);
      await initUser(authUser);
    }
  } catch(e) {
    msg.textContent = e.msg || e.message || 'erreur de connexion';
  }
  this.textContent = isSignUp ? "s'inscrire" : 'se connecter';
  this.disabled = false;
});

document.getElementById('logoutBtn').addEventListener('click', function() {
  signOut();
  loadLocal();
  showAuth();
  render();
});

init();
</script>
</body>
</html>
